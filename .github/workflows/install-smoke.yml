name: Install script smoke test

# Runs install.sh in native mode inside a bare Debian trixie container (no
# systemd, no network access to the fleet's actual devices) so a broken
# installer is caught in CI instead of on someone's Raspberry Pi. Docker mode
# is not covered here; it just runs `docker compose up`, which the published
# image workflow already exercises.

on:
  pull_request:
    paths:
      - install.sh
      - scripts/pi/**
      - .github/workflows/install-smoke.yml
  push:
    branches: [main]
    paths:
      - install.sh
      - scripts/pi/**
      - .github/workflows/install-smoke.yml
  workflow_dispatch:

jobs:
  native-install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      # install.sh's fetch_repo() only ever pulls from git (falling back to
      # a GitHub tarball); pointed at a bare URL it would fetch the published
      # main branch, not the checkout under test. Giving it a branch ref that
      # points at this exact commit, on this exact checkout used as a local
      # git remote, makes REPO_URL=/repo REPO_BRANCH=ci-smoke clone from the
      # mounted working tree instead of the network, so the smoke test
      # exercises the install.sh actually being changed (including on a PR
      # that has not merged yet).
      - name: Point a local branch at this checkout
        run: git branch -f ci-smoke HEAD

      - name: Write the in-container smoke script
        run: |
          cat > /tmp/install-smoke.sh <<'SMOKE'
          #!/usr/bin/env bash
          set -euo pipefail

          echo "==> Installing git so install.sh can clone the mounted checkout"
          apt-get update -y
          apt-get install -y --no-install-recommends git ca-certificates
          # The checkout was made by the runner user; git refuses to touch a
          # repo it doesn't own unless told it's safe. This container reads
          # it as root.
          git config --global --add safe.directory /repo

          echo "==> Running install.sh (native mode, services and kiosk skipped)"
          export DEBIAN_FRONTEND=noninteractive
          export GLANCECAM_MODE=native
          export FORCE_PI=1
          export FORCE_DISPLAY=0
          export GLANCECAM_KIOSK=false
          export GLANCECAM_SKIP_SERVICES=1
          export REPO_URL=/repo
          export REPO_BRANCH=ci-smoke
          bash /repo/install.sh

          echo "==> Verifying the repo was fetched from the mounted checkout"
          test -f /opt/glancecam/app/service/app/main.py

          echo "==> Verifying the go2rtc binary was downloaded"
          bin=/opt/glancecam/go2rtc/go2rtc
          test -x "$bin"
          size=$(stat -c%s "$bin")
          [ "$size" -gt 1000000 ] || { echo "go2rtc binary looks too small ($size bytes)"; exit 1; }
          magic=$(head -c4 "$bin" | od -An -tx1 | tr -d ' \n')
          [ "$magic" = "7f454c46" ] || { echo "go2rtc binary is not an ELF executable"; exit 1; }

          echo "==> Verifying the systemd units were rendered with no leftover tokens"
          for unit in glancecam.service glancecam-go2rtc.service; do
            f="/etc/systemd/system/$unit"
            test -f "$f"
            if grep -q '__' "$f"; then
              echo "$f still has an unsubstituted __TOKEN__"
              exit 1
            fi
          done
          # The kiosk unit is skipped by GLANCECAM_KIOSK=false and must not exist.
          test ! -f /etc/systemd/system/glancecam-kiosk.service

          echo "==> Verifying the venv has the app's dependencies installed"
          /opt/glancecam/venv/bin/python -c "import fastapi, uvicorn, jinja2, httpx"

          echo "==> Verifying the app itself imports under that venv"
          (cd /opt/glancecam/app/service && /opt/glancecam/venv/bin/python -c "
          import sys
          sys.path.insert(0, '.')
          from app.main import app
          print('app import OK:', app.title if hasattr(app, 'title') else app)
          ")

          echo "==> All smoke checks passed"
          SMOKE
          chmod +x /tmp/install-smoke.sh

      - name: Run install.sh in a Debian trixie container
        run: |
          docker run --rm \
            -v "$PWD":/repo:ro \
            -v /tmp/install-smoke.sh:/install-smoke.sh:ro \
            debian:trixie \
            bash /install-smoke.sh
