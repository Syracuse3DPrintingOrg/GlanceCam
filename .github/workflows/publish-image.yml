name: Publish container image

# Builds the GlanceCam service image and publishes it to the GitHub Container
# Registry (GHCR) so anyone can run the app without building it locally. A
# push to main refreshes the :latest and :main-<sha> tags; a v* tag publishes
# a versioned release (semver tags). Run manually from the Actions tab via
# workflow_dispatch.

on:
  push:
    branches: [main]
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Pinned EXPLICITLY, never derived from github.repository: a GHCR package
  # does not follow repo renames, forks, or transfers, and deriving the name
  # from the repository would silently publish to a different package the
  # moment the repo moves, breaking every deployed device's update path with
  # no visible error. The canonical image is the org-owned
  # ghcr.io/syracuse3dprintingorg/glancecam.
  #
  # NOTE: after the FIRST publish to a new package, set its visibility to
  # Public (org -> Packages -> glancecam -> Package settings), or installs
  # cannot pull it without authenticating.
  IMAGE_NAME: syracuse3dprintingorg/glancecam

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: ./service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
