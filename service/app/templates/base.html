<!doctype html>
<html lang="en" data-bs-theme="{{ theme or 'dark' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <!-- A pale lens dot, inline so the app needs no external asset. -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%230b0b0d'/%3E%3Ccircle cx='16' cy='16' r='7' fill='none' stroke='%23cfe8ff' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='2.4' fill='%23cfe8ff'/%3E%3C/svg%3E">
  <link href="/static/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
</head>
<body class="{% block body_class %}gc-body{% endblock %}"
      data-is-pi="{{ 'true' if is_pi else 'false' }}"
      data-kiosk-rotation="{{ kiosk_rotation }}"
      data-fullscreen-main="{{ 'true' if fullscreen_uses_main else 'false' }}"
      data-snapshot-refresh="{{ snapshot_refresh_seconds }}"
      data-go2rtc-path="{{ go2rtc_public_path }}">
  {% block body %}{% endblock %}
  <script src="/static/vendor/bootstrap/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
