<!doctype html>
<html lang="en" data-bs-theme="{{ theme or 'dark' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <!-- Bootstrap 5 from CDN for milestone 1. TODO(UI agent): vendor these
       locally so the app has no external dependency on a LAN with no internet. -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
</head>
<body class="gc-body"
      data-is-pi="{{ 'true' if is_pi else 'false' }}"
      data-kiosk-rotation="{{ kiosk_rotation }}"
      data-fullscreen-main="{{ 'true' if fullscreen_uses_main else 'false' }}"
      data-snapshot-refresh="{{ snapshot_refresh_seconds }}"
      data-go2rtc-path="{{ go2rtc_public_path }}">
  {% block body %}{% endblock %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
